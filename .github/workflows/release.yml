name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate PR title format
        run: |
          # Only validate if this is a PR merge (has pull_request_number)
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            echo "Validating PR title: $PR_TITLE"
            
            # Conventional commit pattern: type(scope)!: description or type!: description or type: description
            if ! echo "$PR_TITLE" | grep -qP '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'; then
              echo "::error::PR title does not follow Conventional Commits format."
              echo "Expected format: type(scope)!: description"
              echo "Examples: feat: add feature, fix: fix bug, feat(cli): add CLI flag"
              exit 1
            fi
            echo "✅ PR title is valid"
          else
            echo "Not a PR merge, skipping title validation"
          fi

      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          majorList: "feat!, breaking-change"
          minorList: "feat, feature"
          patchList: "fix, bugfix, perf, refactor, test, tests, docs, style, ci, chore, build"
          skipInvalidTags: true

      - name: Create GitHub Release
        if: steps.semver.outputs.bump != 'none'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.semver.outputs.next }}
          name: ${{ steps.semver.outputs.next }}
          body: |
            ## What's Changed
            
            ${{ steps.semver.outputs.changelog }}
          draft: false
          prerelease: false
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
